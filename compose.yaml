name: pov

services:
  db:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pov}
      POSTGRES_USER: ${POSTGRES_USER:-pov}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pov-local-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pov} -d ${POSTGRES_DB:-pov}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-pov}:${POSTGRES_PASSWORD:-pov-local-password}@db:5432/${POSTGRES_DB:-pov}?sslmode=disable
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      SESSION_SECRET: ${SESSION_SECRET:-local-development-secret-change-before-deploy}
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost}
      APP_BASE_PATH: ${APP_BASE_PATH:-/}
      UPLOAD_DIR: /data/uploads
      SEOUL_OPEN_DATA_URL: ${SEOUL_OPEN_DATA_URL:-http://openapi.seoul.go.kr:8088}
      SEOUL_OPEN_DATA_KEY: ${SEOUL_OPEN_DATA_KEY:-sample}
      SEOUL_OPEN_DATA_LIMIT: ${SEOUL_OPEN_DATA_LIMIT:-1000}
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/pov-api", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        NUXT_APP_BASE_URL: ${NUXT_APP_BASE_URL:-/}
    restart: unless-stopped
    environment:
      NUXT_APP_BASE_URL: ${NUXT_APP_BASE_URL:-/}
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-/api/v1}
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: "3000"
    depends_on:
      api:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_BIND:-80}:80"
      - "${HTTPS_BIND:-443}:443"
      - "${HTTPS_BIND:-443}:443/udp"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
      - api

volumes:
  postgres-data:
  uploads:
  caddy-data:
  caddy-config:
